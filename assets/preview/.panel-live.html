<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFIM-Proxy · 节点订阅</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f8fa;
      --surface: #ffffff;
      --border: #d0d7de;
      --border-subtle: #eaeef2;
      --text: #1f2328;
      --muted: #656d76;
      --accent: #0969da;
      --accent-hover: #0550ae;
      --accent-soft: #ddf4ff;
      --shadow: 0 1px 3px rgba(31, 35, 40, 0.08);
      --radius: 8px;
      --font: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: "IBM Plex Mono", ui-monospace, Menlo, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 2rem;
    }

    .header {
      margin-bottom: 1.75rem;
    }

    .header-top {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.75rem 1.5rem;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.375rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .meta-line {
      font-size: 0.8125rem;
      color: var(--muted);
    }

    .meta-line strong {
      color: var(--text);
      font-weight: 500;
    }

    .cards-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.75rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .card-head {
      padding: 1rem 1rem 0.75rem;
      border-bottom: 1px solid var(--border-subtle);
    }

    .card-head-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
    }

    .card h2 {
      font-size: 0.9375rem;
      font-weight: 600;
    }

    .badge {
      font-size: 0.6875rem;
      font-weight: 500;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
    }

    .badge.primary {
      border-color: #b6e3ff;
      background: var(--accent-soft);
      color: var(--accent-hover);
    }

    .hint {
      font-size: 0.8125rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .card-body {
      padding: 0.875rem 1rem 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .field-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .link-box {
      background: #f6f8fa;
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 0.6rem 0.7rem;
      font-family: var(--mono);
      font-size: 0.6875rem;
      word-break: break-all;
      color: #24292f;
      max-height: 4.5rem;
      overflow-y: auto;
      line-height: 1.55;
      margin-bottom: 0.875rem;
    }

    .qr {
      text-align: center;
      margin-bottom: 0.875rem;
      padding: 0.75rem;
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      background: #fafbfc;
    }

    .qr img {
      max-width: 168px;
      width: 100%;
      height: auto;
      display: inline-block;
    }

    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    button, .btn {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      font-size: 0.8125rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      color: var(--text);
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }

    button:focus-visible, .btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    button:hover, .btn:hover {
      background: #f3f4f6;
      border-color: #afb8c1;
    }

    .btn-copy {
      width: 100%;
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .btn-copy:hover {
      background: #2c333a;
      border-color: #2c333a;
    }

    .btn-import {
      flex: 1;
      min-width: calc(50% - 0.25rem);
      color: var(--accent);
      border-color: #b6e3ff;
      background: var(--accent-soft);
    }

    .btn-import:hover {
      background: #b6e3ff;
      border-color: #80ccff;
      color: var(--accent-hover);
    }

    .section-divider {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      margin: 0.875rem 0 0.5rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border-subtle);
    }

    footer {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.35rem 0.75rem;
      color: var(--muted);
      font-size: 0.75rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    footer .dot { color: #c4cdd5; }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: var(--text);
      color: #fff;
      padding: 0.55rem 1rem;
      border-radius: 6px;
      font-size: 0.8125rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      z-index: 99;
      box-shadow: 0 4px 12px rgba(31, 35, 40, 0.18);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 960px) {
      .cards-row { grid-template-columns: 1fr; }
      .wrap { padding-top: 1.5rem; }
    }

    @media (max-width: 480px) {
      .btn-import { min-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <div class="header-top">
        <h1>IFIM-Proxy</h1>
        <p class="meta-line"><span id="version-label"></span></p>
      </div>
      <p class="meta-line" id="domain-label">加载中…</p>
    </header>

    <div class="cards-row">
      <div class="card">
        <div class="card-head">
          <div class="card-head-row">
            <h2>订阅链接</h2>
          </div>
          <p class="hint">一次导入 Reality + Hysteria2 双节点（Clash 见分组 stable-proxy）</p>
        </div>
        <div class="card-body">
          <p class="field-label">URL</p>
          <div class="link-box" id="sub-url"></div>
          <div class="qr"><img src="qr-sub.png" alt="订阅二维码" width="168"></div>
          <div class="btns">
            <button class="btn-copy" type="button" id="copy-sub">复制订阅 URL</button>
          </div>
          <p class="section-divider">一键导入</p>
          <div class="btns" id="import-sub-btns"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <div class="card-head-row">
            <h2>Reality</h2>
            <span class="badge primary">主力</span>
          </div>
          <p class="hint">VLESS + Reality + Vision · TCP 443</p>
        </div>
        <div class="card-body">
          <p class="field-label">链接</p>
          <div class="link-box" id="reality-link"></div>
          <div class="qr"><img src="qr-reality.png" alt="Reality 二维码" width="168"></div>
          <div class="btns">
            <button class="btn-copy" type="button" id="copy-reality">复制链接</button>
          </div>
          <p class="section-divider">单节点导入</p>
          <div class="btns" id="import-reality-btns"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <div class="card-head-row">
            <h2>Hysteria2</h2>
            <span class="badge">备用</span>
          </div>
          <p class="hint">Hysteria2 + obfs · UDP 443</p>
        </div>
        <div class="card-body">
          <p class="field-label">链接</p>
          <div class="link-box" id="hy2-link"></div>
          <div class="qr"><img src="qr-hy2.png" alt="Hysteria2 二维码" width="168"></div>
          <div class="btns">
            <button class="btn-copy" type="button" id="copy-hy2">复制链接</button>
          </div>
          <p class="section-divider">单节点导入</p>
          <div class="btns" id="import-hy2-btns"></div>
        </div>
      </div>
    </div>

    <footer>
      <span>IFIM-Proxy</span>
      <span class="dot">·</span>
      <span>请妥善保管此页面链接，勿公开分享</span>
    </footer>
  </div>
  <div class="toast" id="toast">已复制</div>

  <script>
    const INLINE_CFG = null;
    const BUILT_VERSION = '0.0.15';
    let cfg = {};

    function panelVersion(data) {
      const embedded = BUILT_VERSION.includes('SCRIPT_VERSION') ? '' : BUILT_VERSION;
      const v = data.version || embedded;
      return v ? 'v' + v : '';
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg || '已复制';
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 1800);
    }

    function copyText(text) {
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => toast('已复制到剪贴板')).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        toast('已复制到剪贴板');
      });
    }

    function encUrl(u) { return encodeURIComponent(u); }

    function b64Utf8(s) {
      return btoa(unescape(encodeURIComponent(s)));
    }

    function importBtn(label, href) {
      const a = document.createElement('a');
      a.className = 'btn btn-import';
      a.textContent = label;
      a.href = href;
      a.rel = 'noopener';
      return a;
    }

    function fillBtns(boxId, items) {
      const box = document.getElementById(boxId);
      box.innerHTML = '';
      items.forEach(([name, url]) => box.appendChild(importBtn(name, url)));
    }

    function renderSubImports() {
      const sub = cfg.subUrl;
      const clash = cfg.clashUrl;
      fillBtns('import-sub-btns', [
        ['Clash Meta', 'clash-meta://install-config?url=' + encUrl(clash)],
        ['Clash Verge', 'clash://install-config?url=' + encUrl(clash)],
        ['v2rayNG', 'v2rayng://install-config?url=' + encUrl(sub)],
        ['Shadowrocket', 'shadowrocket://add/sub://' + b64Utf8(sub)],
        ['Sing-box', 'sing-box://import-remote-profile?url=' + encUrl(sub) + '#stable-proxy'],
        ['Hiddify', 'hiddify://import/?url=' + encUrl(sub)],
        ['NekoBox', 'sn://subscription?url=' + encUrl(sub)],
      ]);
    }

    function renderNodeImports(boxId, link) {
      fillBtns(boxId, [
        ['Shadowrocket', 'shadowrocket://add/' + encUrl(link)],
        ['v2rayNG', 'v2rayng://install-config?url=' + encUrl(link)],
        ['Sing-box', 'sing-box://import?url=' + encUrl(link)],
        ['Hiddify', 'hiddify://import/?url=' + encUrl(link)],
      ]);
    }

    function renderPanel(data) {
      cfg = data;
      const ver = panelVersion(data);
      document.getElementById('version-label').textContent = ver || '';
      document.getElementById('domain-label').innerHTML =
        '<strong>' + data.domain + '</strong> · ' + (data.created || '');
      document.getElementById('sub-url').textContent = data.subUrl;
      document.getElementById('reality-link').textContent = data.realityLink;
      document.getElementById('hy2-link').textContent = data.hy2Link;

      document.getElementById('copy-sub').onclick = () => copyText(data.subUrl);
      document.getElementById('copy-reality').onclick = () => copyText(data.realityLink);
      document.getElementById('copy-hy2').onclick = () => copyText(data.hy2Link);

      renderSubImports();
      renderNodeImports('import-reality-btns', data.realityLink);
      renderNodeImports('import-hy2-btns', data.hy2Link);
    }

    function loadPanel() {
      if (INLINE_CFG && INLINE_CFG.subUrl) {
        renderPanel(INLINE_CFG);
        return;
      }
      fetch('.config-live.json')
        .then(r => r.json())
        .then(renderPanel)
        .catch(() => {
          document.getElementById('domain-label').textContent = '加载配置失败，请重新运行安装脚本';
        });
    }

    loadPanel();
  </script>
</body>
</html>
