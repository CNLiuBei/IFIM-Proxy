name: Sync Version

on:
  push:
    branches: [main]

jobs:
  sync-version:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version from commit
        run: bash scripts/sync-version.sh

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add install.sh README.md assets/preview/config.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Version already in sync"
          else
            git commit -m "chore: sync version from commit [skip ci]"
            git push
          fi
